name: Uppdatera energipriser

on:
  schedule:
    - cron: '0 5 * * *'   # 06:00 svensk tid (UTC+1), 05:00 UTC
  workflow_dispatch:       # Möjliggör manuell körning från GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checka ut repo
        uses: actions/checkout@v4
          with:
            persist-credentials: true
      - name: Sätt upp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installera beroenden
        run: pip install requests

      - name: Kör uppdateringsscript
        run: python scripts/update_prices.py

      - name: Committa och pusha om data ändrats
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sjovagen22.html
          git diff --cached --quiet || git commit -m "Auto: uppdatera energipriser $(date +'%Y-%m-%d')"
          git push
